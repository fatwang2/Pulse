name: Pulse
options:
  bundleIdPrefix: app.pulse
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

packages:
  PulseCore:
    path: Packages/PulseCore
  PulseUI:
    path: Packages/PulseUI
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.4"

targets:
  PulseMac:
    type: application
    platform: macOS
    sources:
      - PulseMac/Sources
    dependencies:
      - package: PulseCore
      - package: PulseUI
      - package: Sparkle
        product: Sparkle
    info:
      path: PulseMac/Info.plist
      properties:
        CFBundleName: $(PRODUCT_NAME)
        CFBundleDisplayName: $(BUNDLE_DISPLAY_NAME)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSUIElement: true
        LSMinimumSystemVersion: "26.0"
        NSHumanReadableCopyright: "© 2026 Pulse"
        SUEnableAutomaticChecks: true
        SUFeedURL: $(SPARKLE_FEED_URL)
        SUPublicEDKey: $(SPARKLE_PUBLIC_ED_KEY)
        SUScheduledCheckInterval: 86400
    entitlements:
      path: PulseMac/Pulse.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
    settings:
      base:
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: false
        SPARKLE_FEED_URL: ""
        SPARKLE_PUBLIC_ED_KEY: ""
        SWIFT_STRICT_CONCURRENCY: complete
      configs:
        Debug:
          PRODUCT_NAME: Pulse Dev
          BUNDLE_DISPLAY_NAME: Pulse Dev
          PRODUCT_BUNDLE_IDENTIFIER: app.pulse.mac.dev
          ENABLE_HARDENED_RUNTIME: false
        Release:
          PRODUCT_NAME: Pulse
          BUNDLE_DISPLAY_NAME: Pulse
          PRODUCT_BUNDLE_IDENTIFIER: app.pulse.mac
