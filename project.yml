name: Pulse
options:
  bundleIdPrefix: app.pulse
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

packages:
  PulseCore:
    path: Packages/PulseCore
  PulseUI:
    path: Packages/PulseUI
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.4"

targets:
  PulseMac:
    type: application
    platform: macOS
    sources:
      - PulseMac/Sources
      - PulseMac/Resources
    dependencies:
      - package: PulseCore
      - package: PulseUI
      - package: Sparkle
        product: Sparkle
    info:
      path: PulseMac/Info.plist
      properties:
        CFBundleName: $(PRODUCT_NAME)
        CFBundleDisplayName: $(BUNDLE_DISPLAY_NAME)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSUIElement: true
        LSMinimumSystemVersion: "26.0"
        NSHumanReadableCopyright: "© 2026 Pulse"
        SUEnableAutomaticChecks: true
        SUEnableInstallerLauncherService: true
        SUFeedURL: $(SPARKLE_FEED_URL)
        SUPublicEDKey: $(SPARKLE_PUBLIC_ED_KEY)
        SUScheduledCheckInterval: 86400
        # Longbridge OAuth fallback callback (bundle id doubles as the URL scheme,
        # keeping dev and release callbacks isolated)
        CFBundleURLTypes:
          - CFBundleURLName: $(PRODUCT_BUNDLE_IDENTIFIER).oauth
            CFBundleURLSchemes:
              - $(PRODUCT_BUNDLE_IDENTIFIER)
    entitlements:
      path: PulseMac/Pulse.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        # Loopback listener for the Longbridge OAuth redirect (primary callback path)
        com.apple.security.network.server: true
        com.apple.security.temporary-exception.mach-lookup.global-name:
          - $(PRODUCT_BUNDLE_IDENTIFIER)-spks
          - $(PRODUCT_BUNDLE_IDENTIFIER)-spki
    settings:
      base:
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_LANGUAGE: en
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: false
        SPARKLE_FEED_URL: ""
        SPARKLE_PUBLIC_ED_KEY: ""
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          PRODUCT_NAME: Pulse Dev
          BUNDLE_DISPLAY_NAME: Pulse Dev
          PRODUCT_BUNDLE_IDENTIFIER: app.pulse.mac.dev
          ENABLE_HARDENED_RUNTIME: false
        Release:
          PRODUCT_NAME: Pulse
          BUNDLE_DISPLAY_NAME: Pulse
          PRODUCT_BUNDLE_IDENTIFIER: app.pulse.mac
